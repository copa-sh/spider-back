services:
  app:
    build: .
    env_file:
      - .env
    command: gunicorn -c gunicorn.conf.py -w ${GUNICORN_WORKERS:-4} -b 0.0.0.0:${APP_WEB_PORT:-8080} github_fs.web:app
    ports:
      - "${APP_WEB_PORT:-8080}:${APP_WEB_PORT:-8080}"
    volumes:
      - ${APP_DATA_BIND:-/mnt/datos/timeline}:${APP_DATA_DIR:-/datos}:ro
      - ${APP_STATE_BIND:-./state}:${APP_STATE_DIR:-/state}
    restart: unless-stopped
